name: SAESA Diario

on:
  schedule:
    # Lunes a viernes 08:00 AM Chile (UTC-4 invierno / UTC-3 verano)
    # 0 12 = 08:00 en invierno | 0 11 = 08:00 en verano
    # Usamos 11:00 UTC para cubrir horario de verano
    - cron: 0 20 * * 1-5
  workflow_dispatch:

jobs:
  run-saesa:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar automatización SAESA
        run: python automatizacion_saesa.py
        env:
          SAESA_USER: ${{ secrets.SAESA_USER }}
          SAESA_PASS: ${{ secrets.SAESA_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
          DRY_RUN: "false"
          MAX_APROBACIONES: "50"

      - name: Subir capturas
        uses: actions/upload-artifact@v4
        if: always()          # siempre, no solo en fallo
        with:
          name: capturas-saesa-${{ github.run_id }}
          path: capturas/
          if-no-files-found: ignore    # no falla si no hay capturas
