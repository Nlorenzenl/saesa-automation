name: SAESA Diario

on:
  schedule:
    # Lunes a viernes 08:00 AM Chile aprox. UTC-4
    - cron: "0 12 * * 1-5"

  workflow_dispatch:

jobs:
  run-saesa:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Ejecutar automatización SAESA
        run: python automatizacion_saesa.py
        env:
          SAESA_USER: ${{ secrets.SAESA_USER }}
          SAESA_PASS: ${{ secrets.SAESA_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
          DRY_RUN: "false"
          MAX_APROBACIONES: "50"

      - name: Subir capturas si falla
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: capturas-error-saesa
          path: capturas/
          if-no-files-found: ignore
